name: Secret Test
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secret
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -z "$SUPABASE_KEY" ]; then
            echo "Secret is EMPTY"
          else
            echo "Secret is SET. First 4 characters: ${SUPABASE_KEY:0:4}"
          fi
